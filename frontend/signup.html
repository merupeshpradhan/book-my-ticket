<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body
    class="bg-slate-900 text-slate-100 flex items-center justify-center min-h-screen p-4 sm:p-8 bg-[url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop')] bg-cover bg-center">
    <!-- Overlay for background -->
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-0"></div>

    <div
        class="relative z-10 w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-2xl transition-all duration-300 hover:shadow-emerald-500/20 hover:-translate-y-1">

        <div class="text-center mb-8">
            <h1
                class="text-3xl font-bold bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent mb-2">
                Create Account</h1>
            <p class="text-slate-300 text-sm">Join us today and get started</p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
                <input id="name" type="text" placeholder="John Doe"
                    class="w-full p-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
                <input id="email" type="email" placeholder="you@example.com"
                    class="w-full p-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input id="password" type="password" placeholder="••••••••"
                    class="w-full p-3 bg-slate-800/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
            </div>

            <button onclick="signup()" id="signupBtn"
                class="w-full py-3 mt-6 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white rounded-xl font-semibold shadow-lg hover:shadow-emerald-500/30 transition-all active:scale-95 flex justify-center items-center">
                Sign Up
            </button>
        </div>

        <div class="mt-6 text-center text-sm text-slate-400">
            Already have an account?
            <a href="login.html"
                class="text-blue-400 hover:text-blue-300 font-semibold hover:underline transition-colors">Sign In</a>
        </div>
    </div>

    <script>
        async function signup() {
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const btn = document.getElementById('signupBtn');
            const originalText = btn.innerText;

            btn.innerText = 'Creating account...';
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                const res = await fetch("/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: nameInput.value,
                        email: emailInput.value,
                        password: passwordInput.value
                    })
                });

                if (res.ok) {
                    alert("User created successfully!");
                    window.location.href = "login.html";
                } else {
                    let data = {};
                    try {
                        data = await res.json();
                    } catch (e) { }
                    alert(data.error || "Signup failed");
                }
            } catch (err) {
                alert("Network error. Please try again.");
            } finally {
                btn.innerText = originalText;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }
    </script>
</body>

</html>
